<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>Chrome 익스텐션 설치 방법</title>
  <style>
    /* 이 CSS는 이 파일을 단독으로 열었을 때용입니다.
       index.html에서 AJAX로 불러올 때는 <style> 태그가 제거되고,
       index.html의 공통 CSS(.container, .box 등)가 적용됩니다. */

    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    .box {
      background: #ffffff;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
      margin-bottom: 20px;
      font-size: 14px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 8px;
      letter-spacing: -0.03em;
    }

    h2 {
      font-size: 18px;
      margin: 16px 0 8px;
    }

    h3 {
      font-size: 15px;
      margin: 14px 0 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      line-height: 1.7;
      margin: 4px 0 10px;
    }

    li {
      line-height: 2.0;
    }

    .tag-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .tip {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* 제목 링크 스타일 */
    .title-link {
      color: #111827;
      font-weight: 600;
      text-decoration: none;
    }

    .title-link:hover {
      color: #2563eb;
      text-decoration: underline;
    }

    /* 링크 표 스타일 */
    .link-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 13px;
    }

    .link-table th,
    .link-table td {
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      vertical-align: top;
    }

    .link-table th {
      background: #f9fafb;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: #4b5563;
    }

    /* 기능 및 효과(3번째 열)만 폰트 1단계 작게 */
    .link-table td:nth-child(3) {
      font-size: 12px;
    }

    .cat-tip {
      background: #ecfdf5;
    }

    /* 팁 */
    .cat-traffic {
      background: #eff6ff;
    }

    /* 채널 유입 */
    .cat-produce {
      background: #fef9c3;
    }

    /* 영상제작 */
    .cat-plan {
      background: #fdf2f8;
    }

    /* 기획 */
    .cat-community {
      background: #e0f2fe;
    }

    /* 커뮤니티 */

    .example-box {
      border-radius: 12px;
      border: 1px dashed #d1d5db;
      background: #f9fafb;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 2.0;
      margin-top: 6px;
    }

    .step-gray {
      background: #f3f4f6;
      font-weight: 700;
    }

    .box-dark {
      background: #1f2937;
      color: #ffffff;
      border: none;
    }
  </style>
</head>
