<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkDrop V2 - HTML 테스트 페이지</title>
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'sans-serif'],
            },
          }
        }
      }
    </script>
</head>
<body class="bg-slate-900 text-slate-50 flex flex-col items-center justify-center h-screen m-0 overflow-hidden font-sans">
    <div class="container text-center p-12 bg-slate-800/50 backdrop-blur-md rounded-[2rem] border border-white/10 shadow-2xl max-w-lg">
        <div class="mb-8 relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
            <img src="/img/content/longform/Voiceactor.webp" alt="AI Voice Actor" class="relative w-full h-48 object-cover rounded-2xl border border-white/10 shadow-lg">
        </div>
        <h1 class="text-4xl font-black mb-4 bg-gradient-to-r from-indigo-500 to-purple-400 bg-clip-text text-transparent">Image Test</h1>
        <p class="text-slate-400 text-base mb-8">public/img 폴더 내의 이미지를 불러온 예시입니다.</p>
        <a href="/front" class="inline-block px-8 py-4 bg-indigo-600 text-white no-underline rounded-2xl font-extrabold transition-all hover:bg-indigo-700 hover:-translate-y-0.5 hover:shadow-[0_10px_20px_-5px_rgba(99,102,241,0.4)] active:scale-95">메인으로 돌아가기</a>
    </div>
</body>
</html>
