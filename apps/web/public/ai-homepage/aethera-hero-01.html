<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aethera® — Begin Journey</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-text: #000000;
      --color-muted: #6f6f6f;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      overflow-x: hidden;
    }

    /* ── Animations ─────────────────────────────────── */
    @keyframes fade-rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-rise {
      animation: fade-rise 0.8s ease-out both;
    }
    .animate-fade-rise-delay {
      animation: fade-rise 0.8s 0.2s ease-out both;
    }
    .animate-fade-rise-delay-2 {
      animation: fade-rise 0.8s 0.4s ease-out both;
    }

    /* ── Scene Container ────────────────────────────── */
    .scene {
      position: relative;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      background: var(--color-bg);
    }

    /* ── Video Layer ────────────────────────────────── */
    .video-layer {
      position: absolute;
      inset: auto 0 0 0;
      top: 300px;
      z-index: 0;
    }

    #bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: none;
    }

    /* Gradient overlays — top & bottom fade into white */
    .video-layer::before,
    .video-layer::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      z-index: 1;
      pointer-events: none;
    }
    .video-layer::before {
      top: 0;
      height: 40%;
      background: linear-gradient(to bottom, #ffffff, transparent);
    }
    .video-layer::after {
      bottom: 0;
      height: 40%;
      background: linear-gradient(to top, #ffffff, transparent);
    }

    /* ── Navigation ─────────────────────────────────── */
    nav {
      position: relative;
      z-index: 10;
      width: 100%;
    }

    .nav-inner {
      max-width: 80rem;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.875rem;
      letter-spacing: -0.025em;
      color: #000000;
      text-decoration: none;
      line-height: 1;
    }

    .logo sup {
      font-size: 0.55em;
      vertical-align: super;
      line-height: 0;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }

    .nav-menu a {
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-menu a.active  { color: #000000; }
    .nav-menu a.muted   { color: #6f6f6f; }
    .nav-menu a.muted:hover { color: #000000; }

    .btn-nav {
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 9999px;
      padding: 0.625rem 1.5rem;
      cursor: pointer;
      transition: transform 0.2s;
      white-space: nowrap;
    }
    .btn-nav:hover { transform: scale(1.03); }

    /* Mobile nav */
    @media (max-width: 640px) {
      .nav-menu { display: none; }
    }

    /* ── Hero Section ───────────────────────────────── */
    .hero {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: calc(8rem - 75px);
      padding-bottom: 10rem;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }

    .hero-headline {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.95;
      letter-spacing: -2.46px;
      color: #000000;
      max-width: 80rem;
    }

    .hero-headline em {
      color: #6f6f6f;
      font-style: italic;
    }

    .hero-desc {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 2vw, 1.125rem);
      color: #6f6f6f;
      max-width: 42rem;
      margin-top: 2rem;
      line-height: 1.65;
    }

    .btn-hero {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 9999px;
      padding: 1.25rem 3.5rem;
      margin-top: 3rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-hero:hover { transform: scale(1.03); }
  </style>
</head>
<body>

<div class="scene">

  <!-- Video Background -->
  <div class="video-layer">
    <video id="bg-video" muted playsinline preload="auto">
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_083109_283f3553-e28f-428b-a723-d639c617eb2b.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- Navigation -->
  <nav>
    <div class="nav-inner">
      <a href="#" class="logo">Aethera<sup>®</sup></a>

      <ul class="nav-menu">
        <li><a href="#" class="active">Home</a></li>
        <li><a href="#" class="muted">Studio</a></li>
        <li><a href="#" class="muted">About</a></li>
        <li><a href="#" class="muted">Journal</a></li>
        <li><a href="#" class="muted">Reach Us</a></li>
      </ul>

      <button class="btn-nav">Begin Journey</button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h1 class="hero-headline animate-fade-rise">
      Beyond <em>silence,</em> we build <em>the eternal.</em>
    </h1>

    <p class="hero-desc animate-fade-rise-delay">
      Building platforms for brilliant minds, fearless makers, and thoughtful souls.
      Through the noise, we craft digital havens for deep work and pure flows.
    </p>

    <button class="btn-hero animate-fade-rise-delay-2">Begin Journey</button>
  </section>

</div>

<script>
  (function () {
    const video = document.getElementById('bg-video');
    const FADE_DURATION = 0.5; // seconds

    let rafId = null;
    let isFading = false;

    function setOpacity(val) {
      video.style.opacity = val;
    }

    function tick() {
      if (!video.duration || isNaN(video.duration)) {
        rafId = requestAnimationFrame(tick);
        return;
      }

      const t = video.currentTime;
      const d = video.duration;

      // Fade in at the start
      if (t < FADE_DURATION) {
        setOpacity(t / FADE_DURATION);
      }
      // Fade out near the end
      else if (t > d - FADE_DURATION) {
        setOpacity((d - t) / FADE_DURATION);
      }
      else {
        setOpacity(1);
      }

      rafId = requestAnimationFrame(tick);
    }

    function startLoop() {
      setOpacity(0);
      video.currentTime = 0;
      video.play().catch(() => {});
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(tick);
    }

    video.addEventListener('ended', function () {
      setOpacity(0);
      setTimeout(startLoop, 100);
    });

    video.addEventListener('canplay', function onReady() {
      video.removeEventListener('canplay', onReady);
      startLoop();
    });

    // Fallback: try playing immediately
    startLoop();
  })();
</script>

</body>
</html>
