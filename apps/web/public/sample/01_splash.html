<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01_splash — Sowon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+KR:wght@300;400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { overflow: hidden; }

body {
  background: #07070f;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 60px;
  font-family: 'Noto Serif KR', serif;
}

/* ── 브라우저 네비 ── */
.browser-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 332px;
  margin-bottom: 12px;
}
.nav-links {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: #40405a; font-family: sans-serif;
}
.nav-links a { color: #5a5a7a; text-decoration: none; }
.nav-links a:hover { color: #9e6ecb; }
.nav-sep { color: #2a2a4a; }

/* ── 폰 래퍼 ── */
.phone-wrapper {
  transform: scale(0.85);
  transform-origin: top center;
  margin-bottom: calc(844px * -0.15);
}

/* ── 폰 프레임 ── */
.phone-frame {
  width: 390px;
  height: 844px;
  border-radius: 54px;
  background: #07070f;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow:
    0 0 0 2px rgba(255,255,255,0.12),
    0 0 0 9px #12101a,
    0 0 0 11px rgba(255,255,255,0.05),
    0 40px 100px rgba(0,0,0,0.85);
}

/* ── 페르소나 배경 ── */
.persona-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.persona-slide {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  opacity: 0;
  transition: opacity 1.2s ease;
}

/* ── 스크림 ── */
.scrim {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(
    to bottom,
    rgba(7,7,15,0.50) 0%,
    rgba(7,7,15,0.08) 25%,
    rgba(7,7,15,0.08) 75%,
    rgba(7,7,15,0.55) 100%
  );
  pointer-events: none;
}

/* ── 상태바 ── */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  height: 50px;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 28px 10px;
  font-family: -apple-system, sans-serif;
  font-size: 15px; font-weight: 600;
  color: rgba(200,169,110,0.65);
}
.dynamic-island {
  position: absolute;
  top: 10px; left: 50%; transform: translateX(-50%);
  width: 126px; height: 37px;
  background: #000; border-radius: 20px;
}
.status-icons { display: flex; align-items: center; gap: 5px; font-size: 11px; }

/* ── 크레딧 스크롤 ── */
.credits-wrap {
  position: absolute;
  inset: 0;
  z-index: 20;
  overflow: hidden;
  pointer-events: none;
  -webkit-mask-image: linear-gradient(
    to bottom,
    transparent  0%,
    black       28%,
    black       72%,
    transparent 92%
  );
  mask-image: linear-gradient(
    to bottom,
    transparent  0%,
    black       28%,
    black       72%,
    transparent 92%
  );
}
.credits-inner {
  position: absolute;
  top: 0; left: 0; right: 0;
  text-align: center;
  padding: 0 40px;
  transform: translateY(844px);
  animation: credits-scroll 24s 0s linear forwards;
}
@keyframes credits-scroll {
  from { transform: translateY(580px); }
  to   { transform: translateY(-820px); }
}

.c-gap   { height: 56px; }
.c-gap-s { height: 32px; }

.sub-bg {
  background: rgba(0,0,0,0.40);
  padding: 5px 20px;
  border-radius: 4px;
  display: inline;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
}
.c-hook {
  font-size: 34px;
  font-weight: 700;
  color: rgba(245,235,215,0.96);
  letter-spacing: 2px;
  line-height: 1.9;
  text-shadow:
    0 0 28px rgba(200,169,110,0.70),
    0 0 70px rgba(200,169,110,0.32);
}
.c-body {
  font-size: 22px;
  font-weight: 300;
  color: rgba(225,210,190,0.88);
  line-height: 2.1;
}
.c-question {
  font-size: 24px;
  font-weight: 400;
  color: rgba(230,215,195,0.90);
  line-height: 2.1;
}
.c-em {
  color: #c8a96e;
  font-weight: 700;
  font-size: 28px;
  text-shadow:
    0 0 18px rgba(200,169,110,0.92),
    0 0 48px rgba(200,169,110,0.48);
}

/* ── CTA 패널 (크레딧 종료 후 등장) ── */
.cta-panel {
  position: absolute;
  inset: 0;
  z-index: 30;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 120px 32px 90px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
}
.cta-panel.visible {
  opacity: 1;
  pointer-events: auto;
}
.cta-logo-wrap { text-align: center; }
.cta-logo {
  font-family: 'Cinzel', serif;
  font-size: 34px;
  font-weight: 700;
  letter-spacing: 10px;
  color: #c8a96e;
  text-shadow:
    0 0 24px rgba(200,169,110,0.70),
    0 0 56px rgba(200,169,110,0.32);
  display: block;
  margin-bottom: 10px;
}
.cta-tagline {
  font-size: 11px;
  letter-spacing: 4px;
  color: rgba(200,169,110,0.40);
  text-transform: uppercase;
}
.cta-buttons {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 56px;
  border-radius: 16px;
  font-family: 'Noto Serif KR', serif;
  font-size: 15px; font-weight: 400;
  text-decoration: none; cursor: pointer;
  border: none; letter-spacing: 0.8px;
  transition: transform 0.14s, opacity 0.14s;
}
.btn:active { transform: scale(0.97); }
.btn-google {
  background: #ffffff;
  color: #000000;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.30);
}
.btn-apple {
  background: #000000;
  color: #ffffff;
  font-weight: 700;
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.20);
}
.btn-guest {
  background: transparent;
  border: 1px solid rgba(200,169,110,0.25);
  color: rgba(200,169,110,0.60);
  font-size: 14px;
  height: 48px;
}
.footer-note {
  font-size: 10px;
  color: rgba(200,169,110,0.22);
  letter-spacing: 0.5px;
  text-align: center;
  margin-top: -4px;
}

/* ── 스킵 버튼 ── */
.btn-skip {
  position: absolute;
  bottom: 52px;
  right: 28px;
  z-index: 40;
  background: rgba(0,0,0,0.38);
  border: 1px solid rgba(200,169,110,0.28);
  border-radius: 20px;
  padding: 7px 18px;
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  color: rgba(200,169,110,0.70);
  cursor: pointer;
  letter-spacing: 1px;
  transition: opacity 0.3s;
}
.btn-skip:hover { opacity: 0.7; }
.btn-skip.hidden { display: none; }

/* ── 홈 인디케이터 ── */
.home-indicator {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 34px;
  display: flex; align-items: center; justify-content: center;
  z-index: 30;
}
.home-bar {
  width: 134px; height: 5px;
  background: rgba(200,169,110,0.22);
  border-radius: 3px;
}
</style>
</head>
<body>

    <span class="nav-sep">|</span>

<div class="phone-wrapper">
<div class="phone-frame">

  <!-- 스크림 -->

  <!-- 상태바 -->
  <div class="status-bar">

      <span>●●●</span><span style="font-size:10px">WiFi</span><span>▐▌</span>

  <div class="credits-wrap">

  <!-- CTA 패널 -->
  <div class="cta-panel" id="ctaPanel">

    <div class="cta-buttons">

          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>

          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>

    </div>
  </div>

  <!-- 스킵 버튼 -->
  <button class="btn-skip" id="btnSkip">SKIP ›</button>

  <!-- 홈 인디케이터 -->

</div>
</div>

<script>
/* 마지막 텍스트 사라지기 전 CTA 등장 (24s 애니메이션 중 21s 시점) */
var ctaTimer = setTimeout(function () {
  showCta();
}, 21000);

function showCta() {
  document.getElementById('ctaPanel').classList.add('visible');
  document.getElementById('btnSkip').classList.add('hidden');
}

document.getElementById('btnSkip').addEventListener('click', function () {
  clearTimeout(ctaTimer);
  document.querySelector('.credits-inner').style.animation = 'none';
  document.querySelector('.credits-wrap').style.opacity = '0';
  showCta();
});
</script>
<script>
(function () {
  var IMAGES  = [
    'img/Personas/Nana.webp',
    'img/Personas/Scholar.webp',
    'img/Personas/Prophet.webp',
    'img/Personas/Mago.webp'
  ];
  var HOLD_MS = 2400;
  var FADE_MS = 700;

  var bg = document.getElementById('personaBg');
  var slides = IMAGES.map(function (src) {
    var img = document.createElement('img');
    img.src = src;
    img.className = 'persona-slide';
    bg.appendChild(img);
    return img;
  });

  var cur = 0;
  slides[0].style.opacity = '0.88';

  setInterval(function () {
    var next = (cur + 1) % slides.length;
    slides[next].style.zIndex = '2';
    slides[next].style.opacity = '0.88';
    setTimeout(function () {
      slides[cur].style.opacity = '0';
      slides[cur].style.zIndex = '1';
      cur = next;
    }, FADE_MS);
  }, HOLD_MS + FADE_MS);
})();
</script>
