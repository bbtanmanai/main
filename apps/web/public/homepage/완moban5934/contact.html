<!DOCTYPE html>
<html lang="zxx">
<head>
	<title>Glamour - Fashion HTML Template</title>
	<meta charset="UTF-8">
	<meta name="description" content="Glamour Fashion HTML Template">
	<meta name="keywords" content="glamour, fashion, html">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- Stylesheets -->
	<link rel="stylesheet" href="static/css/bootstrap.min.css">
	<link rel="stylesheet" href="static/css/font-awesome.min.css">
	<link rel="stylesheet" href="static/css/owl.carousel.min.css">
	<link rel="stylesheet" href="static/css/flaticon.css">
	<link rel="stylesheet" href="static/css/magnific-popup.css">

	<!-- Main Stylesheets -->
	<link rel="stylesheet" href="static/css/style.css">



</head>
<body>
	<!-- Page Preloder -->
	<div id="preloder">
		<div class="loader"></div>
	</div>

	<div class="sp-line"></div>

	<!-- Header section -->
	<header class="header-section">
		<div class="container">
			<ul class="main-menu-left site-menu-style">                        
				<li><a href="index.html">Home</a></li>
				<li><a href="about.html">About the Brand  </a></li>
				<li><a href="portfolio.html">Portfolio</a></li>
			</ul>
			<a href="index.html" class="site-logo">
				<img src="static/picture/logo.png" alt="">
			</a>
			<ul class="main-menu-right site-menu-style">
				<li><a href="elements.html">Shop </a></li>
				<li><a href="blog.html">News</a></li>
				<li><a href="">Contact</a></li>
			</ul>
		</div>
		<div class="search-switch">
			<img src="static/picture/search-icon.png" alt="">
		</div>
	</header>
	<!-- Header section end -->


	<!-- Page info section -->
	<section class="page-info-section set-bg" data-setbg="img/page-info-bg/3.jpg">
		<h2>Contact</h2>
	</section>
	<!-- Page info section end -->


	<!-- Contact section -->
	<section class="contact-section">
		<div class="container">
			<div class="text-center contact-title">
				<h2>Get in touch</h2>
			</div>
			<form class="contact-form">
				<div class="row">
					<div class="col-lg-6">
						<input type="text" placeholder="Your Name">
					</div>
					<div class="col-lg-6">
						<input type="text" placeholder="Your E-mail">
					</div>
					<div class="col-lg-12">
						<input type="text" placeholder="Subject">
						<textarea placeholder="Message"></textarea>
						<div class="text-center">
							<button class="site-btn">Send</button>
						</div>
					</div>
				</div>
			</form>
		</div>
	</section>
	<!-- Contact section -->



	
	<!-- Newslatter section -->
	<section class="newsletter-section">
		<div class="container">
			<div class="row mb-5">
				<div class="col-lg-3 text-white">
					<h3>Our Newsletter</h3>
				</div>
				<div class="col-lg-9">
					<form class="newsletter-form">
						<input type="text" placeholder="Your E-mail">
						<button class="site-btn sb-white">subscribe</button>
					</form>	
				</div>
			</div>
			<div class="row">
				<div class="col-12 text-muted">Copyright &copy; 2021.Company name All rights reserved.</div>
			</div>
		</div>

	</section>
	<!-- Newslatter section end -->
	

	<!-- Search model -->
	<div class="search-model">
		<div class="h-100 d-flex align-items-center justify-content-center">
			<div class="search-close-switch">+</div>
			<form class="search-model-form">
				<input type="text" id="search-input" placeholder="Search here.....">
			</form>
		</div>
	</div>
	<!-- Search model end -->
	       

	<!--====== Javascripts & Jquery ======-->
	<script src="static/js/jquery-3.2.1.min.js"></script>
	<script src="static/js/bootstrap.min.js"></script>
	<script src="static/js/jquery.magnific-popup.min.js"></script>
	<script src="static/js/owl.carousel.min.js"></script>
	<script src="static/js/isotope.pkgd.min.js"></script>
	<script src="static/js/circle-progress.min.js"></script>
	<script src="static/js/main.js"></script>

	</body>
</html>
