<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LinkDrop AI 쇼츠제작 — 고성과 쇼츠 분석 및 시니어 타겟 대본 자동 생성">
    <title>AI 쇼츠제작 — LinkDrop</title>
    <link rel="stylesheet" href="css/linkdrop.css">
    <style>
        .shorts-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .shorts-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .shorts-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .shorts-input {
            flex: 1;
            padding: 14px 20px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .shorts-input:focus {
            border-color: #6366f1;
        }
        .shorts-btn {
            padding: 0 28px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .shorts-btn:hover {
            background: #4f46e5;
        }
        .shorts-result {
            margin-top: 32px;
            padding: 24px;
            background: #f8fafc;
            border-radius: 12px;
            display: none;
        }
        .shorts-result-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .shorts-script {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #475569;
        }
    </style>
</head>

<body>
    <!-- GNB (공통 컴포넌트) -->
    <div id="gnb-placeholder"></div>

    <div class="page-content">
        <main class="main">
            <div class="blog-functional-bar">
                <div class="bfb-left">
                    <h2 class="bfb-title">AI 쇼츠제작</h2>
                    <p class="bfb-sub">키워드 하나로 고성과 쇼츠 대본을 만듭니다.</p>
                </div>
                <div class="bfb-right">
                    <nav class="bfb-breadcrumb">
                        <a href="index.html">홈</a>
                        <span>›</span>
                        <a href="#">AI 활용</a>
                        <span>›</span>
                        <span>AI 쇼츠제작</span>
                    </nav>
                </div>
            </div>

            <div class="shorts-container">
                <div class="shorts-header">
                    <h3>유튜브 쇼츠 트렌드 분석 및 재작성</h3>
                    <p>원하는 키워드를 입력하면 인기 영상을 분석하여 시니어 타겟 대본을 생성합니다.</p>
                </div>
                <div class="shorts-input-group">
                    <input type="text" id="keywordInput" class="shorts-input" placeholder="예: 시니어 운동, 스마트폰 활용법...">
                    <button id="generateBtn" class="shorts-btn">생성하기</button>
                </div>
                <div id="loading" style="display:none; text-align:center; padding: 20px;">
                    분석 중입니다... 잠시만 기다려주세요.
                </div>
                <div id="resultArea" class="shorts-result">
                    <div class="shorts-result-title">✨ 생성된 시니어 맞춤형 대본</div>
                    <div id="scriptContent" class="shorts-script"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/loader.js" defer></script>
    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const keyword = document.getElementById('keywordInput').value;
            if (!keyword) return alert('키워드를 입력해주세요.');

            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const scriptContent = document.getElementById('scriptContent');

            loading.style.display = 'block';
            resultArea.style.display = 'none';

            // 실제 백엔드 연동 전까지 시뮬레이션
            setTimeout(() => {
                loading.style.display = 'none';
                resultArea.style.display = 'block';
                scriptContent.innerText = `[${keyword}] 관련 시니어 타겟 쇼츠 대본\n\n(다정한 언니 말투로)\n"어머~ 동생분들, 요즘 ${keyword} 때문에 고민 많으시죠? 딱 1분만 저랑 같이 해봐요..."`;
            }, 2000);
        });
    </script>

    <!-- 푸터 (공통 컴포넌트) -->
    <div id="footer-placeholder"></div>
</body>

</html>
