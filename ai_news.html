<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LinkDrop 뉴스요약 — 긴 뉴스를 AI가 핵심만 콕 집어 요약해드립니다.">
    <title>뉴스요약 — LinkDrop</title>
    <link rel="stylesheet" href="css/linkdrop.css">
    <style>
        .news-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .news-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .news-input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .news-textarea {
            width: 100%;
            height: 200px;
            padding: 14px 20px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            resize: none;
            transition: border-color 0.2s;
        }
        .news-textarea:focus {
            border-color: #6366f1;
        }
        .news-btn {
            align-self: flex-end;
            padding: 12px 32px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .news-btn:hover {
            background: #4f46e5;
        }
        .news-result {
            margin-top: 32px;
            padding: 24px;
            background: #f8fafc;
            border-radius: 12px;
            display: none;
        }
        .news-result-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .news-summary {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #475569;
        }
    </style>
</head>

<body>
    <!-- GNB (공통 컴포넌트) -->
    <div id="gnb-placeholder"></div>

    <div class="page-content">
        <main class="main">
            <div class="blog-functional-bar">
                <div class="bfb-left">
                    <h2 class="bfb-title">뉴스요약</h2>
                    <p class="bfb-sub">긴 뉴스를 AI가 핵심만 콕 집어 요약해드립니다.</p>
                </div>
                <div class="bfb-right">
                    <nav class="bfb-breadcrumb">
                        <a href="index.html">홈</a>
                        <span>›</span>
                        <a href="#">AI 활용</a>
                        <span>›</span>
                        <span>뉴스요약</span>
                    </nav>
                </div>
            </div>

            <div class="news-container">
                <div class="news-header">
                    <h3>AI 뉴스 핵심 요약</h3>
                    <p>요약하고 싶은 뉴스 전문을 붙여넣어 주세요.</p>
                </div>
                <div class="news-input-group">
                    <textarea id="newsInput" class="news-textarea" placeholder="여기에 뉴스 내용을 붙여넣으세요..."></textarea>
                    <button id="generateBtn" class="news-btn">요약하기</button>
                </div>
                <div id="loading" style="display:none; text-align:center; padding: 20px;">
                    요약 중입니다... 잠시만 기다려주세요.
                </div>
                <div id="resultArea" class="news-result">
                    <div class="news-result-title">✨ AI 뉴스 요약 결과</div>
                    <div id="summaryContent" class="news-summary"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/loader.js" defer></script>
    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const content = document.getElementById('newsInput').value;
            if (!content) return alert('뉴스 내용을 입력해주세요.');

            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const summaryContent = document.getElementById('summaryContent');

            loading.style.display = 'block';
            resultArea.style.display = 'none';

            // 시뮬레이션
            setTimeout(() => {
                loading.style.display = 'none';
                resultArea.style.display = 'block';
                summaryContent.innerText = `[뉴스 핵심 요약]\n\n1. 주요 사건: ...\n2. 핵심 포인트: ...\n3. 전망: ...`;
            }, 2000);
        });
    </script>

    <!-- 푸터 (공통 컴포넌트) -->
    <div id="footer-placeholder"></div>
</body>

</html>
