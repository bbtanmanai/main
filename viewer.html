<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkDrop Content Viewer</title>
    <link rel="stylesheet" href="css/basic.css">
    <style>
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }

        #content-area {
            display: none;
        }

        /* Prompt Box Styles */
        .prompt-container {
            position: relative;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 2rem 0;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #1e293b;
        }

        .copy-badge {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: #fff;
            border: 1px solid #cbd5e1;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: sans-serif;
            transition: all 0.2s;
        }

        .copy-badge:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>

<body class="sans">
    <div id="loader" class="loading">콘텐츠를 불러오는 중...</div>

    <div id="content-area">
        <header class="content-box" style="border-bottom:none; padding-bottom:0;">
            <div id="title" class="page-title" style="margin-bottom:0.2em;"></div>
            <div id="category" style="opacity:0.6; font-size:0.9rem; margin-bottom:2em;"></div>
        </header>

        <div class="content-box" id="main-container">
            <!-- Dynamic Content Injected Here -->
        </div>

        <footer
            style="margin-top:4em; text-align:center; padding:2em; opacity:0.5; font-size:0.8rem; border-top:1px solid rgba(0,0,0,0.05);">
            © LinkDrop - All rights reserved.
        </footer>
    </div>

    <div id="toast" class="toast">📋 복사 완료</div>

    <script src="js/viewer.js"></script>
</body>

</html>
