<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LinkDrop 프롬프트 라이브러리 — 실무에 바로 쓰는 AI 프롬프트 모음">
    <title>프롬프트 라이브러리 — LinkDrop</title>
    <link rel="stylesheet" href="css/linkdrop.css">
</head>

<body>
    <!-- GNB (공통 컴포넌트) -->
    <div id="gnb-placeholder"></div>

    <!-- Content -->
    <div class="page-content">
        <main class="main">
            <!-- 기능 바 -->
            <div class="blog-functional-bar">
                <div class="bfb-left">
                    <h2 class="bfb-title" id="mainTitle">전체 프롬프트</h2>
                    <p class="bfb-sub">실무에 바로 쓰는 AI 프롬프트 모음</p>
                </div>
                <div class="bfb-right">
                    <nav class="bfb-breadcrumb">
                        <a href="index.html">홈</a>
                        <span>›</span>
                        <a href="#">AI 활용</a>
                        <span>›</span>
                        <span>프롬프트 라이브러리</span>
                    </nav>
                    <div class="bfb-search">
                        <input type="text" id="searchInput" placeholder="프롬프트 검색…" autocomplete="off">
                        <button type="button" aria-label="검색">
                            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                                <path
                                    d="M8.117 0C12.593 0 16.234 3.64 16.234 8.117c0 2.027-.747 3.883-1.98 5.308l5.574 5.574c.229.229.229.6 0 .829-.229.229-.6.229-.829 0l-5.575-5.575A8.083 8.083 0 0 1 8.117 16.234C3.641 16.234 0 12.593 0 8.117 0 3.641 3.641 0 8.117 0zm0 15.063c3.83 0 6.945-3.116 6.945-6.946C15.062 4.287 11.947 1.17 8.117 1.17c-3.83 0-6.945 3.116-6.945 6.945 0 3.83 3.115 6.946 6.945 6.946z"
                                    fill="currentColor" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 필터 칩 (basic 방식) -->
            <div class="filter-chip-bar" id="filterChipBar"></div>

            <!-- 카드 그리드 -->
            <div class="bg-card-grid" id="cardGrid"></div>

            <!-- 페이지네이션 -->
            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <!-- Detail Panel (Overlay) -->
    <div class="detail-overlay" id="detailOverlay"></div>
    <aside class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <div class="detail-header-meta">
                <span class="detail-cat-badge" id="detailCatBadge"></span>
            </div>
            <button class="detail-close" id="detailClose">✕</button>
        </div>
        <div class="detail-body" id="detailBody">
            <!-- 제목 -->
            <div class="detail-title" id="detailTitle"></div>

            <div>
                <div class="detail-section-label">📋 프롬프트</div>
                <div class="detail-content-box" id="detailContent"></div>
            </div>

            <!-- 사용 방법 -->
            <div id="detailUsageWrap">
                <hr class="detail-divider">
                <div class="detail-section-label">💡 사용 방법</div>
                <div id="detailUsage" class="detail-usage-box"></div>
            </div>
        </div>
        <div class="detail-footer">
            <button class="btn-save" id="detailCopyBtn" style="width:100%">📋 프롬프트 복사</button>
        </div>
    </aside>

    <div id="toast"></div>
    
    <!-- Supabase SDK 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/prompt_work_v2.js" defer></script>
    <script src="js/loader.js" defer></script>

    <!-- 푸터 (공통 컴포넌트) -->
    <div id="footer-placeholder"></div>
</body>

</html>
