<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LinkDrop 아이디어 공장 — AI로 비즈니스 아이디어를 구체화하고 브레인스토밍합니다.">
    <title>아이디어 공장 — LinkDrop</title>
    <link rel="stylesheet" href="css/linkdrop.css">
    <style>
        .idea-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .idea-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .idea-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .idea-input {
            flex: 1;
            padding: 14px 20px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .idea-input:focus {
            border-color: #6366f1;
        }
        .idea-btn {
            padding: 0 28px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .idea-btn:hover {
            background: #4f46e5;
        }
        .idea-result {
            margin-top: 32px;
            padding: 24px;
            background: #f8fafc;
            border-radius: 12px;
            display: none;
        }
        .idea-result-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .idea-content {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #475569;
        }
    </style>
</head>

<body>
    <!-- GNB (공통 컴포넌트) -->
    <div id="gnb-placeholder"></div>

    <div class="page-content">
        <main class="main">
            <div class="blog-functional-bar">
                <div class="bfb-left">
                    <h2 class="bfb-title">아이디어 공장</h2>
                    <p class="bfb-sub">AI와 함께 비즈니스 아이디어를 구체화합니다.</p>
                </div>
                <div class="bfb-right">
                    <nav class="bfb-breadcrumb">
                        <a href="index.html">홈</a>
                        <span>›</span>
                        <a href="#">AI 활용</a>
                        <span>›</span>
                        <span>아이디어 공장</span>
                    </nav>
                </div>
            </div>

            <div class="idea-container">
                <div class="idea-header">
                    <h3>비즈니스 아이디어 브레인스토밍</h3>
                    <p>생각 중인 키워드를 입력하면 AI가 비즈니스 모델과 아이디어를 제안합니다.</p>
                </div>
                <div class="idea-input-group">
                    <input type="text" id="keywordInput" class="idea-input" placeholder="예: 시니어 구독 서비스, 로컬 마켓 앱...">
                    <button id="generateBtn" class="idea-btn">생성하기</button>
                </div>
                <div id="loading" style="display:none; text-align:center; padding: 20px;">
                    아이디어 생성 중... 잠시만 기다려주세요.
                </div>
                <div id="resultArea" class="idea-result">
                    <div class="idea-result-title">✨ AI 제안 비즈니스 아이디어</div>
                    <div id="ideaContent" class="idea-content"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/loader.js" defer></script>
    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const keyword = document.getElementById('keywordInput').value;
            if (!keyword) return alert('키워드를 입력해주세요.');

            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const ideaContent = document.getElementById('ideaContent');

            loading.style.display = 'block';
            resultArea.style.display = 'none';

            // 시뮬레이션
            setTimeout(() => {
                loading.style.display = 'none';
                resultArea.style.display = 'block';
                ideaContent.innerText = `[${keyword}] 관련 비즈니스 제안\n\n1. 타겟 분석: ...\n2. 수익 모델: ...\n3. 차별화 전략: ...`;
            }, 2000);
        });
    </script>

    <!-- 푸터 (공통 컴포넌트) -->
    <div id="footer-placeholder"></div>
</body>

</html>
